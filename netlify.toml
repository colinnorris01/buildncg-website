# Netlify configuration
[build]
  publish = "."

# =============================================
# DOMAIN REDIRECTS
# =============================================

# Redirect old domain → new domain (norrisconstructiongroup.com → buildncg.com)
[[redirects]]
  from = "https://norrisconstructiongroup.com/*"
  to = "https://buildncg.com/:splat"
  status = 301
  force = true

# Also redirect www version of old domain
[[redirects]]
  from = "https://www.norrisconstructiongroup.com/*"
  to = "https://buildncg.com/:splat"
  status = 301
  force = true

# Redirect www.buildncg.com → buildncg.com (keep it clean, one canonical URL)
[[redirects]]
  from = "https://www.buildncg.com/*"
  to = "https://buildncg.com/:splat"
  status = 301
  force = true

# =============================================
# SECURITY HEADERS
# =============================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets for performance
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
